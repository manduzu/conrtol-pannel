<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Tracking | FleetCtrl</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div style="display:flex;height:100vh;overflow:hidden">

<!-- SIDEBAR -->
<aside style="width:240px;flex-shrink:0;background:#0f172a;display:flex;flex-direction:column;height:100vh;border-right:1px solid rgba(255,255,255,0.1)">
  <div style="padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 4px 12px rgba(59,130,246,.4)">FC</div>
      <div>
        <div style="font-size:16px;font-weight:700;color:#f8fafc;letter-spacing:-.4px">FleetCtrl</div>
        <div style="font-size:11px;color:#64748b;margin-top:1px">Control Center</div>
      </div>
    </div>
  </div>
  <nav style="flex:1;padding:12px 10px;overflow-y:auto">
    <div class="nav-label">Main Menu</div>
    <a href="dashboard.html" class="nav-link">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      Dashboard
    </a>
    <a href="fleet-management.html" class="nav-link">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      Fleet Management
    </a>
    <a href="tracking.html" class="nav-link active">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
      Live Tracking
    </a>
    <a href="orders.html" class="nav-link">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2"/></svg>
      Orders
    </a>
    <div class="nav-label">Staff & Logistics</div>
    <a href="drivers.html" class="nav-link">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      Drivers
    </a>
    <a href="inventory.html" class="nav-link">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
      Inventory (Store)
    </a>
    <a href="invoices.html" class="nav-link">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      Invoices
    </a>
    <div class="nav-label">System</div>
    <a href="settings.html" class="nav-link">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Settings
    </a>
  </nav>
  <div style="padding:16px;border-top:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:12px;flex-shrink:0">
    <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0">AD</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:600;color:#f8fafc">Admin User</div>
      <div style="font-size:11px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">admin@fleetctrl.com</div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div style="flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden">
  <header style="height:54px;background:#fff;border-bottom:1px solid #e8edf5;display:flex;align-items:center;padding:0 22px;gap:14px;flex-shrink:0;box-shadow:0 1px 0 rgba(0,0,0,.03)">
    <div style="position:relative;flex:1;max-width:360px">
      <svg style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#94a3b8" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" placeholder="Search vehicles, routes, drivers…"/>
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
      <button style="position:relative;width:34px;height:34px;border-radius:9px;border:1px solid #e8edf5;background:#f8fafc;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#64748b">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span style="position:absolute;top:6px;right:6px;width:7px;height:7px;background:#ef4444;border-radius:50%;border:1.5px solid #f8fafc"></span>
      </button>
      <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:#fff;cursor:pointer">AD</div>
    </div>
  </header>

  <div style="flex:1;display:flex;min-height:0;overflow:hidden">
    <div style="flex:1;position:relative;background:#eef2f8;overflow:hidden">
      <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(160,185,215,.3) 1px,transparent 1px),linear-gradient(90deg,rgba(160,185,215,.3) 1px,transparent 1px);background-size:44px 44px;pointer-events:none"></div>
      <div class="vpin" style="left:30%;top:40%"><div class="vpin-label" style="background:#1d4ed8">Truck T-101</div><div class="vpin-dot" style="background:#3b82f6"><div class="vpin-ring" style="background:#3b82f6"></div></div></div>
      <div class="vpin" style="left:60%;top:25%"><div class="vpin-label" style="background:#15803d">Van V-204</div><div class="vpin-dot" style="background:#10b981"><div class="vpin-ring" style="background:#10b981"></div></div></div>
      <div style="position:absolute;bottom:14px;left:14px;background:rgba(255,255,255,.96);border:1px solid #e2e8f0;border-radius:10px;padding:9px 13px;box-shadow:0 3px 12px rgba(0,0,0,.07)">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
          <div class="live-dot" style="width:7px;height:7px;border-radius:50%;background:#10b981"></div>
          <span style="font-size:12px;font-weight:700;color:#0f172a">5 Vehicles Active</span>
        </div>
        <div style="font-size:11px;color:#94a3b8">1 Idle · 0 Offline</div>
      </div>
    </div>
    <div style="width:285px;flex-shrink:0;background:#fff;border-left:1px solid #e8edf5;display:flex;flex-direction:column;overflow:hidden">
      <div style="padding:13px 14px 11px;border-bottom:1px solid #f1f5f9;flex-shrink:0">
        <p style="font-size:13px;font-weight:700;color:#0f172a">Active Vehicles</p>
      </div>
      <div style="flex:1;overflow-y:auto">
        <div class="vcard selected">
          <div style="display:flex;align-items:center;gap:9px">
            <div style="width:34px;height:34px;background:#dbeafe;border-radius:9px;display:flex;align-items:center;justify-content:center;border:1px solid #bfdbfe">
              <svg width="16" height="16" fill="none" stroke="#3b82f6" stroke-width="1.8" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
            </div>
            <div>
              <p style="font-size:12.5px;font-weight:700;color:#0f172a">Truck T-101</p>
              <p style="font-size:11px;color:#94a3b8">John Doe</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>
</body>
</html>
